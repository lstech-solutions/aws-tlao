AWSTemplateFormatVersion: '2010-09-09'
Description: 'Route53 GitHub Pages DNS records for tláo.com'

Parameters:
  DomainName:
    Type: String
    Default: 'xn--tlo-fla.com'
    Description: 'Punycode version of tláo.com'

  GitHubPagesHost:
    Type: String
    Default: 'lstech-solutions.github.io'
    Description: 'GitHub Pages host for the organization or user site'

Resources:
  ApexARecords:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub '${DomainName}.'
      Type: A
      TTL: 300
      ResourceRecords:
        - 185.199.108.153
        - 185.199.109.153
        - 185.199.110.153
        - 185.199.111.153

  ApexAAAARecords:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub '${DomainName}.'
      Type: AAAA
      TTL: 300
      ResourceRecords:
        - 2606:50c0:8000::153
        - 2606:50c0:8001::153
        - 2606:50c0:8002::153
        - 2606:50c0:8003::153

  WwwRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub 'www.${DomainName}.'
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub '${GitHubPagesHost}.'

Outputs:
  GitHubPagesDnsSummary:
    Description: 'GitHub Pages DNS configuration'
    Value: !Sub |
      Apex A: 185.199.108.153, 185.199.109.153, 185.199.110.153, 185.199.111.153
      Apex AAAA: 2606:50c0:8000::153, 2606:50c0:8001::153, 2606:50c0:8002::153, 2606:50c0:8003::153
      WWW CNAME: ${GitHubPagesHost}.
