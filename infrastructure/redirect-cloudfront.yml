# DEPRECATED / NOT USED IN CURRENT PRODUCTION
# Kept only as a reference stub for a possible future Route53/CloudFront redirect flow.
# Current production path uses direct GitHub Pages DNS via infrastructure/cloudformation/domain-redirect.yaml.

AWSTemplateFormatVersion: '2010-09-09'
Description: 'DEPRECATED reference stub - not used in current production'

Parameters:
  DomainName:
    Type: String
    Default: xn--tlo-fla.com
    Description: The punycode apex domain for TLÁO'

  GitHubPagesHost:
    Type: String
    Default: lstech-solutions.github.io
    Description: The GitHub Pages host for the organization or user site'

Resources:
  ApexARecords:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub '${DomainName}.'
      Type: A
      TTL: 300
      ResourceRecords:
        - 185.199.108.153
        - 185.199.109.153
        - 185.199.110.153
        - 185.199.111.153

  ApexAAAARecords:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub '${DomainName}.'
      Type: AAAA
      TTL: 300
      ResourceRecords:
        - 2606:50c0:8000::153
        - 2606:50c0:8001::153
        - 2606:50c0:8002::153
        - 2606:50c0:8003::153

  WwwRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName: !Sub '${DomainName}.'
      Name: !Sub 'www.${DomainName}.'
      Type: CNAME
      TTL: 300
      ResourceRecords:
        - !Sub '${GitHubPagesHost}.'
